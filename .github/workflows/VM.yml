name: Setup Runner + Cloudflared + V2Ray

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 修改 runner 密码
      - name: Update runner password
        run: |
          echo "runner:runner" | sudo chpasswd

      # 安装 Cloudflared
      - name: Install Cloudflared
        run: |
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null

          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list

          sudo apt-get update
          sudo apt-get install -y cloudflared

      # 安装 V2Ray
      - name: Install V2Ray
        run: |
          sudo apt update -y
          sudo apt install -y curl unzip

          sudo mkdir -p /usr/local/v2ray
          cd /usr/local/v2ray

          sudo curl -L -o /usr/local/v2ray/v2ray.zip https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
          sudo unzip -o /usr/local/v2ray/v2ray.zip -d /usr/local/v2ray
          sudo chmod +x /usr/local/v2ray/v2ray

          # 创建配置目录
          sudo mkdir -p /usr/local/etc/v2ray

          # 下载配置文件
          sudo wget https://raw.githubusercontent.com/africadicks/VM/refs/heads/main/config/config.json
          sudo mv config.json /usr/local/etc/v2ray/config.json
      # 创建 systemd 服务
      - name: Setup V2Ray service
        run: |
          sudo tee /etc/systemd/system/v2ray.service > /dev/null <<EOF
          [Unit]
          Description=V2Ray Service
          After=network.target
          
          [Service]
          ExecStart=/usr/local/v2ray/v2ray -config /usr/local/etc/v2ray/config.json
          Restart=always
          
          [Install]
          WantedBy=multi-user.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable v2ray
          sudo systemctl start v2ray

      # 启动 Tunnel
      - name: Start Cloudflared
        run: |
          sudo cloudflared service install eyJhIjoiOGQyMDg4NjE0Nzg1N2EwY2RjYzhkYjc3OGU4YjZlZjciLCJ0IjoiYjU4MjQ2MmItZTY5My00NzJkLThiMjktNmFkOWY1MDAyNzJhIiwicyI6Ik1ERXlOamcxTURJdE5UaGhZeTAwTUdJd0xUZzRPRE10TlRNek1UazFOVFprTkRJdyJ9
          sudo systemctl start cloudflared

      # 输出信息
      - name: Show Info
        run: |
          echo "====================="
          echo "Config loaded from GitHub"
          echo "====================="
          sleep 99999
