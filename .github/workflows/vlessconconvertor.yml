name: Extract VLESS Links

on:
  workflow_dispatch:

permissions:
  contents: write   # 👈 关键
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyyaml

      - name: Run script
        run: python scripts/extract_vless.py

      - name: Commit result
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add vless.txt
          git commit -m "update vless list" || echo "no changes"
          git push
